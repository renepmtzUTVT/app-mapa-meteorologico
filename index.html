<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Geográfico Profesional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🌍 Localizador Geográfico Global🌍 </h1>
        <p>Consumo de API OpenStreetMap con control de versiones integral. Por (Coloca tu nombre completo)</p>
    </header>
    <main>
        <div class="search-container">
            <input type="text" id="city-input" placeholder="Introduce un lugar (ej. Monterrey, Madrid)...">
            <button id="search-btn">Consultar API</button>
        </div>
        <div id="weather-card" class="weather-card">
            <p>Introduce una ubicación para desplegar las coordenadas y descripción geográfica. </p>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
