<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Map Professional Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🌍 Weather Map Global Dashboard</h1>
        <p>Monitoreo meteorológico integral en tiempo real.</p>
    </header>
    <main>
        <div class="search-container">
            <input type="text" id="city-input" placeholder="Introduce una ciudad (ej. London, Madrid)...">
            <button id="search-btn">Buscar Clima</button>
        </div>
        <div id="weather-card" class="weather-card">
            <p>Introduce una ubicación para desplegar los parámetros meteorológicos.</p>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
